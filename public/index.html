<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>

    <!-- Manifiesto de la Progressive Web App: permite "Agregar a pantalla de inicio" -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AguaDiaria" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      Necesitas habilitar JavaScript para usar AguaDiaria.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>

    <!-- Registra el service worker para que la PWA funcione sin conexión y sea instalable -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/service-worker.js').catch(function () {
            // Si falla el registro (por ejemplo, en desarrollo sin HTTPS), la app
            // sigue funcionando con normalidad, solo sin soporte sin conexión.
          });
        });
      }
    </script>
  </body>
</html>
